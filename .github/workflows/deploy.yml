name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch: {} # 수동 실행 허용

# 동시 배포 방지 (마지막 push만 배포)
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: '049299dee7673ebacc130e6b8d542425'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply D1 migrations (remote)
        run: npx wrangler d1 migrations apply guild-db --remote

      - name: Build & Deploy
        run: npm run deploy
